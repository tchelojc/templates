<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>ALMAFLUXO · Simulador de Coerência Quântica</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Orbitron', sans-serif;
            background: #05050A;
            color: #fff;
            overflow: hidden;
        }
        /* Fundo cósmico com nebulosas */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 30% 40%, #1a1030 0%, #0a0815 50%, #020105 100%);
            z-index: -2;
        }
        
        /* Painéis vidro fosco */
        .glass {
            background: rgba(5, 8, 18, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 168, 67, 0.25);
            border-radius: 24px;
            padding: 22px 26px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(100,150,255,0.1);
        }
        
        #ui {
            position: absolute;
            top: 24px;
            left: 24px;
            width: 360px;
            z-index: 100;
            border-left: 4px solid #d4a843;
        }
        
        h2 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 4px;
            color: #d4a843;
            text-shadow: 0 0 15px #d4a84380;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 1px solid #3a5a8c;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        h2 span {
            font-size: 16px;
            color: #7aa5d9;
            font-weight: 400;
        }
        
        label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: #aac2e5;
            margin-bottom: 8px;
            display: block;
        }
        
        select, input {
            width: 100%;
            padding: 12px 14px;
            background: #0c1428;
            color: #f0e6d2;
            border: 1px solid #3a5a8c;
            border-radius: 14px;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            box-shadow: inset 0 2px 5px #00000080;
            transition: all 0.2s;
        }
        select option {
            background: #0c1428;
        }
        select:hover, select:focus {
            border-color: #d4a843;
            box-shadow: 0 0 12px #d4a84340, inset 0 2px 5px #000;
        }
        
        .slider-block {
            margin-bottom: 22px;
        }
        .slider-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .slider-row span {
            min-width: 45px;
            text-align: right;
            color: #d4a843;
            font-weight: 600;
            text-shadow: 0 0 8px #d4a843;
        }
        
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
            padding: 0;
        }
        input[type=range]::-webkit-slider-runnable-track {
            height: 8px;
            background: #151e30;
            border-radius: 10px;
            border: 1px solid #2a3a55;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(145deg, #f5d060, #d4a843);
            margin-top: -7px;
            box-shadow: 0 0 20px #d4a843, 0 2px 6px #000;
            border: 1px solid #ffe6a0;
            cursor: pointer;
        }
        
        .mac-area {
            margin-top: 24px;
            padding-top: 18px;
            border-top: 1px solid #3a5a8c;
            text-align: center;
        }
        .mac-value {
            font-size: 52px;
            font-weight: 800;
            background: linear-gradient(135deg, #d4a843, #ffe6a0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px #d4a843;
            letter-spacing: 6px;
            margin: 5px 0;
        }
        .mac-label {
            font-size: 13px;
            color: #aac8ff;
            letter-spacing: 3px;
        }
        .mac-interpretation {
            font-size: 13px;
            color: #c0d4ff;
            min-height: 45px;
            padding: 8px 12px;
            background: #0a1428b0;
            border-radius: 30px;
            margin-top: 14px;
            border: 1px solid #4a6fa5;
        }
        
        #transmute-panel {
            position: absolute;
            bottom: 30px;
            left: 24px;
            width: 360px;
            z-index: 100;
            border-right: 4px solid #d4a843;
        }
        .transmute-title {
            color: #d4a843;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: 3px;
        }
        .transmute-selects {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .transmute-selects select {
            flex: 1;
        }
        .transmute-btn {
            background: transparent;
            color: #d4a843;
            border: 1.5px solid #d4a843;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            margin-top: 16px;
            width: 100%;
            cursor: pointer;
            font-family: 'Orbitron';
            letter-spacing: 3px;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .transmute-btn:hover {
            background: #d4a843;
            color: #050510;
            box-shadow: 0 0 25px #d4a843;
        }
        #transmute-result {
            margin-top: 14px;
            color: #e0b860;
            font-size: 13px;
            min-height: 40px;
            text-align: center;
        }
        
        #telemetry-right {
            position: absolute;
            top: 24px;
            right: 24px;
            width: 260px;
            z-index: 100;
            text-align: right;
            border-right: 4px solid #00f2ff;
        }
        .element-badge {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #aac8ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 25px #00f2ff;
        }
        .element-detail {
            font-size: 13px;
            opacity: 0.9;
        }
        .element-role {
            margin-top: 14px;
            font-size: 12px;
            color: #b8c8e8;
            font-style: italic;
        }
        
        #mode-hint {
            position: absolute;
            bottom: 30px;
            right: 30px;
            color: #7a9bcb;
            font-size: 11px;
            opacity: 0.5;
            z-index: 200;
        }
        
        canvas {
            display: block;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="ui" class="glass">
        <h2>⚛️ ALMAFLUXO <span></h2>
        <div>
            <label>🔮 Elemento Primordial</label>
            <select id="element-select"></select>
        </div>
        <div class="slider-block">
            <label>🌀 Intenção (Iₙ)</label>
            <div class="slider-row">
                <input type="range" id="i-slider" min="0.0" max="1.0" step="0.01" value="0.82">
                <span id="i-val">0.82</span>
            </div>
        </div>
        <div class="slider-block">
            <label>💫 Sentimento (Sₙ)</label>
            <div class="slider-row">
                <input type="range" id="s-slider" min="0.0" max="1.0" step="0.01" value="0.75">
                <span id="s-val">0.75</span>
            </div>
        </div>
        <div class="slider-block">
            <label>🌌 Qualia (Q)</label>
            <div class="slider-row">
                <input type="range" id="q-slider" min="0.0" max="1.0" step="0.01" value="0.68">
                <span id="q-val">0.68</span>
            </div>
        </div>
        <div class="mac-area">
            <div class="mac-label">⚡ COERÊNCIA MAC ⚡</div>
            <div class="mac-value" id="mac-status">847</div>
            <div id="mac-interpretation" class="mac-interpretation">Ressonância Harmônica Estável</div>
        </div>
    </div>

    <div id="transmute-panel" class="glass">
        <div class="transmute-title">🜁 CICLO 3-6-9 · TRANSMUTAÇÃO</div>
        <div class="transmute-selects">
            <select id="elem-a-select"></select>
            <span style="color:#d4a843; font-size:20px;">+</span>
            <select id="elem-b-select"></select>
        </div>
        <button class="transmute-btn" id="transmute-btn">Ativar Portal</button>
        <div id="transmute-result"></div>
    </div>

    <div id="telemetry-right" class="glass">
        <div id="current-element-symbol" class="element-badge">H</div>
        <div id="current-element-name" style="font-size:18px;">Hidrogênio</div>
        <div class="element-detail" id="current-element-group">PORTAL FÍSICO</div>
        <div class="element-detail" id="current-element-freq">f₀: 1420 Hz</div>
        <div class="element-role" id="current-element-role">Semente das Realidades</div>
    </div>
    
    <div id="mode-hint">⚡ SINGULARITY ENGINE v2.0 ⚡</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // ======================== BANCO DE DADOS QUÂNTICO (118 elementos) ========================
        const QUANTUM_ELEMENTS = {};
        
        (function buildDatabase() {
            // Primeiros 10 elementos com dados ricos
            const base = {
                'H':{Z:1, raiz:1, grupo:'PORTAL_FISICO', freq:1420.4, coh:0.98, harm:0.95, est:0.99, cor:'#FF6666', nome:'Hidrogênio', role:'Semente das Realidades', estado:'GASOSO'},
                'He':{Z:2, raiz:2, grupo:'PORTAL_FISICO', freq:1803, coh:0.99, harm:0.85, est:0.95, cor:'#D9FFFF', nome:'Hélio', role:'Espelho Dimensional', estado:'GASOSO'},
                'Li':{Z:3, raiz:3, grupo:'ATIVACAO_FISICA', freq:671, coh:0.75, harm:0.65, est:0.70, cor:'#CC80FF', nome:'Lítio', role:'Ativador de Campos', estado:'SOLIDO'},
                'Be':{Z:4, raiz:4, grupo:'ATIVACAO_FISICA', freq:890, coh:0.80, harm:0.70, est:0.85, cor:'#C2FF00', nome:'Berílio', role:'Arquiteto', estado:'SOLIDO'},
                'B':{Z:5, raiz:5, grupo:'PONTE_ENERGETICA', freq:950, coh:0.72, harm:0.68, est:0.78, cor:'#FFB5B5', nome:'Boro', role:'Filtro Dimensional', estado:'SOLIDO'},
                'C':{Z:6, raiz:6, grupo:'PONTE_ENERGETICA', freq:1200, coh:0.85, harm:0.90, est:0.80, cor:'#909090', nome:'Carbono', role:'Rede de Consciência', estado:'SOLIDO'},
                'N':{Z:7, raiz:7, grupo:'PONTE_ENERGETICA', freq:1350, coh:0.78, harm:0.82, est:0.75, cor:'#3050F8', nome:'Nitrogênio', role:'Fixador de Potencial', estado:'GASOSO'},
                'O':{Z:8, raiz:8, grupo:'PONTE_ENERGETICA', freq:1501, coh:0.88, harm:0.85, est:0.82, cor:'#FF0D0D', nome:'Oxigênio', role:'Portal de Energia', estado:'GASOSO'},
                'F':{Z:9, raiz:9, grupo:'SINGULARIDADE', freq:1800, coh:0.92, harm:0.88, est:0.85, cor:'#90E050', nome:'Flúor', role:'Transformador de Estados', estado:'GASOSO'},
                'Ne':{Z:10, raiz:1, grupo:'SINGULARIDADE', freq:1950, coh:0.96, harm:0.91, est:0.90, cor:'#B3E3F5', nome:'Neônio', role:'Emissor de Padrões', estado:'GASOSO'}
            };
            Object.keys(base).forEach(s => QUANTUM_ELEMENTS[s] = base[s]);
            
            const nomes = {
                'Na':'Sódio','Mg':'Magnésio','Al':'Alumínio','Si':'Silício','P':'Fósforo','S':'Enxofre','Cl':'Cloro','Ar':'Argônio',
                'K':'Potássio','Ca':'Cálcio','Sc':'Escândio','Ti':'Titânio','V':'Vanádio','Cr':'Cromo','Mn':'Manganês','Fe':'Ferro','Co':'Cobalto','Ni':'Níquel','Cu':'Cobre','Zn':'Zinco','Ga':'Gálio','Ge':'Germânio','As':'Arsênio','Se':'Selênio','Br':'Bromo','Kr':'Criptônio',
                'Rb':'Rubídio','Sr':'Estrôncio','Y':'Ítrio','Zr':'Zircônio','Nb':'Nióbio','Mo':'Molibdênio','Tc':'Tecnécio','Ru':'Rutênio','Rh':'Ródio','Pd':'Paládio','Ag':'Prata','Cd':'Cádmio','In':'Índio','Sn':'Estanho','Sb':'Antimônio','Te':'Telúrio','I':'Iodo','Xe':'Xenônio',
                'Cs':'Césio','Ba':'Bário','La':'Lantânio','Ce':'Cério','Pr':'Praseodímio','Nd':'Neodímio','Pm':'Promécio','Sm':'Samário','Eu':'Európio','Gd':'Gadolínio','Tb':'Térbio','Dy':'Disprósio','Ho':'Hólmio','Er':'Érbio','Tm':'Túlio','Yb':'Itérbio','Lu':'Lutécio',
                'Hf':'Háfnio','Ta':'Tântalo','W':'Tungstênio','Re':'Rênio','Os':'Ósmio','Ir':'Irídio','Pt':'Platina','Au':'Ouro','Hg':'Mercúrio','Tl':'Tálio','Pb':'Chumbo','Bi':'Bismuto','Po':'Polônio','At':'Astato','Rn':'Radônio',
                'Fr':'Frâncio','Ra':'Rádio','Ac':'Actínio','Th':'Tório','Pa':'Protactínio','U':'Urânio','Np':'Netúnio','Pu':'Plutônio','Am':'Amerício','Cm':'Cúrio','Bk':'Berquélio','Cf':'Califórnio','Es':'Einstênio','Fm':'Férmio','Md':'Mendelévio','No':'Nobélio','Lr':'Laurêncio',
                'Rf':'Rutherfórdio','Db':'Dúbnio','Sg':'Seabórgio','Bh':'Bóhrio','Hs':'Hássio','Mt':'Meitnério','Ds':'Darmstádtio','Rg':'Roentgênio','Cn':'Copernício','Nh':'Nihônio','Fl':'Fleróvio','Mc':'Moscóvio','Lv':'Livermório','Ts':'Tenessino','Og':'Oganessônio'
            };
            
            const symbols = Object.keys(nomes);
            symbols.forEach((sym, idx) => {
                const Z = idx + 11;
                if (QUANTUM_ELEMENTS[sym]) return;
                const raiz = ((Z - 1) % 9) + 1;
                let grupo = 'EIXO_TRANSICAO';
                if ([3,4,11,12,19,20,37,38,55,56,87,88].includes(Z)) grupo = 'ATIVACAO_FISICA';
                else if ([5,6,7,8,13,14,15,16,31,32,33,34,49,50,51,52,81,82,83,113,114,115,116].includes(Z)) grupo = 'PONTE_ENERGETICA';
                else if ([9,10,17,18,35,36,53,54,85,86,117,118].includes(Z) || Z>=109) grupo = 'SINGULARIDADE';
                
                QUANTUM_ELEMENTS[sym] = {
                    Z, raiz, grupo,
                    freq: Math.round(400 + 300 * Math.log(Z+1) * (raiz/5)),
                    coh: Math.min(0.99, 0.65 + 0.3*Math.sin(Z*0.2) + 0.1*(raiz/9)),
                    harm: Math.min(0.99, 0.6 + 0.35*Math.cos(Z*0.15)),
                    est: Math.max(0.2, 0.95 - Z*0.003),
                    cor: `hsl(${Z*23 % 360}, 75%, 55%)`,
                    nome: nomes[sym],
                    role: `Função Quântica ${raiz}`,
                    estado: Z<20?'SOLIDO':(Z%2?'SOLIDO':'LIQUIDO')
                };
            });
            
            // Ajustes especiais
            QUANTUM_ELEMENTS['Fe'] = {...QUANTUM_ELEMENTS['Fe'], freq:1020, coh:0.81, cor:'#E06633', role:'Núcleo da Realidade'};
            QUANTUM_ELEMENTS['Au'] = {...QUANTUM_ELEMENTS['Au'], freq:1340, coh:0.94, cor:'#FFD700', role:'Armazenador de Tempo', grupo:'SINGULARIDADE'};
            QUANTUM_ELEMENTS['Og'] = {...QUANTUM_ELEMENTS['Og'], freq:11800, coh:0.99, cor:'#6A0DAD', role:'Unificador Quântico', grupo:'SINGULARIDADE'};
        })();

        // ======================== THREE.JS ========================
        let scene, camera, renderer, mainSphere, particleSystem;
        let currentElement = 'H';
        
        function initThree() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x05050A);
            scene.fog = new THREE.FogExp2(0x05050A, 0.012);
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(3.5, 2.5, 9);
            camera.lookAt(0,0,0);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);
            
            // Iluminação temática
            scene.add(new THREE.AmbientLight(0x1a2440));
            const l1 = new THREE.PointLight(0x446688, 1.8, 35); l1.position.set(6,8,6); scene.add(l1);
            const l2 = new THREE.PointLight(0xd4a843, 1.2, 40); l2.position.set(-5,4,8); scene.add(l2);
            const l3 = new THREE.PointLight(0x8844aa, 0.9, 30); l3.position.set(4,-3,-8); scene.add(l3);
            
            updateSphereGeometry(currentElement);
            
            // Partículas
            const pGeo = new THREE.BufferGeometry();
            const count = 5000;
            const pos = new Float32Array(count*3);
            for (let i=0; i<count*3; i+=3) {
                const r = 4 + Math.random()*5;
                const th = Math.random()*Math.PI*2, ph = Math.acos(2*Math.random()-1);
                pos[i] = r*Math.sin(ph)*Math.cos(th);
                pos[i+1] = r*Math.sin(ph)*Math.sin(th);
                pos[i+2] = r*Math.cos(ph);
            }
            pGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            particleSystem = new THREE.Points(pGeo, new THREE.PointsMaterial({color:0x88aaff, size:0.035, transparent:true, blending:THREE.AdditiveBlending}));
            scene.add(particleSystem);
            
            // Estrelas
            const sGeo = new THREE.BufferGeometry();
            const sPos = new Float32Array(3000*3);
            for (let i=0; i<3000*3; i+=3) { sPos[i]=(Math.random()-0.5)*300; sPos[i+1]=(Math.random()-0.5)*300; sPos[i+2]=(Math.random()-0.5)*300; }
            sGeo.setAttribute('position', new THREE.BufferAttribute(sPos, 3));
            scene.add(new THREE.Points(sGeo, new THREE.PointsMaterial({color:0xffffff, size:0.2})));
        }
        
        function updateSphereGeometry(symbol) {
            if (mainSphere) scene.remove(mainSphere);
            const el = QUANTUM_ELEMENTS[symbol];
            if (!el) return;
            
            let geo;
            const r = el.raiz;
            if (r===1) geo = new THREE.SphereGeometry(1.9, 64,32);
            else if (r===2) geo = new THREE.TorusKnotGeometry(1.4,0.45,48,8);
            else if (r===3) geo = new THREE.TetrahedronGeometry(2.0);
            else if (r===4) geo = new THREE.OctahedronGeometry(1.9);
            else if (r===5) geo = new THREE.DodecahedronGeometry(1.7);
            else if (r===6) geo = new THREE.IcosahedronGeometry(1.9);
            else if (r===7) geo = new THREE.ConeGeometry(1.7,2.4,7);
            else if (r===8) geo = new THREE.BoxGeometry(2.3,2.3,2.3);
            else geo = new THREE.IcosahedronGeometry(1.9,1);
            
            const mat = new THREE.MeshStandardMaterial({
                color: el.cor, emissive: new THREE.Color(el.cor).multiplyScalar(0.45),
                roughness:0.22, metalness:0.15, transparent:true, opacity:0.94
            });
            mainSphere = new THREE.Mesh(geo, mat);
            mainSphere.castShadow = mainSphere.receiveShadow = true;
            scene.add(mainSphere);
        }
        
        function calcularCoerencia(I,S,Q,el) {
            if (!el) return 0;
            return Math.min(1, Math.max(0, (I*el.coh + S*el.harm + Q*el.est)/3));
        }
        
        function atualizarUI() {
            const sym = document.getElementById('element-select').value;
            const el = QUANTUM_ELEMENTS[sym];
            if (!el) return;
            currentElement = sym;
            
            document.getElementById('current-element-symbol').textContent = sym;
            document.getElementById('current-element-name').textContent = el.nome;
            document.getElementById('current-element-group').textContent = el.grupo.replace(/_/g,' ');
            document.getElementById('current-element-freq').textContent = `f₀: ${Math.round(el.freq)} Hz`;
            document.getElementById('current-element-role').textContent = el.role;
            
            document.getElementById('i-slider').value = el.coh.toFixed(2);
            document.getElementById('s-slider').value = el.harm.toFixed(2);
            document.getElementById('q-slider').value = el.est.toFixed(2);
            document.getElementById('i-val').textContent = el.coh.toFixed(2);
            document.getElementById('s-val').textContent = el.harm.toFixed(2);
            document.getElementById('q-val').textContent = el.est.toFixed(2);
            
            atualizarMAC();
            updateSphereGeometry(sym);
            if (particleSystem) particleSystem.material.color.set(el.cor);
        }
        
        function atualizarMAC() {
            const I = +document.getElementById('i-slider').value;
            const S = +document.getElementById('s-slider').value;
            const Q = +document.getElementById('q-slider').value;
            const sym = document.getElementById('element-select').value;
            const el = QUANTUM_ELEMENTS[sym];
            if (!el) return;
            
            const coer = calcularCoerencia(I,S,Q,el);
            document.getElementById('mac-status').textContent = Math.round(coer*1000);
            const interp = document.getElementById('mac-interpretation');
            if (coer>0.9) interp.textContent = '✨ SINGULARIDADE CONSCIENCIAL ATINGIDA ✨';
            else if (coer>0.75) interp.textContent = '🌀 Campo Morfogenético Altamente Coerente';
            else if (coer>0.5) interp.textContent = '🌊 Ressonância Parcial · Em Harmonia';
            else interp.textContent = '💤 Coerência Baixa · Necessita Alinhamento';
            
            if (mainSphere) {
                mainSphere.material.emissiveIntensity = 0.3 + coer*0.9;
                mainSphere.scale.setScalar(1.0 + coer*0.15*Math.sin(performance.now()*0.005));
            }
        }
        
        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now()*0.001;
            const el = QUANTUM_ELEMENTS[currentElement];
            if (el && mainSphere) {
                mainSphere.rotation.y = time * 0.12 * (el.freq/1200);
                mainSphere.rotation.x = Math.sin(time*0.15)*0.1;
                mainSphere.rotation.z += 0.002;
            }
            if (particleSystem) {
                particleSystem.rotation.y += 0.0015;
                particleSystem.rotation.x += 0.0008;
            }
            renderer.render(scene, camera);
        }
        
        function populateSelectors() {
            const sel = document.getElementById('element-select');
            const selA = document.getElementById('elem-a-select');
            const selB = document.getElementById('elem-b-select');
            const syms = Object.keys(QUANTUM_ELEMENTS).sort((a,b)=>QUANTUM_ELEMENTS[a].Z - QUANTUM_ELEMENTS[b].Z);
            syms.forEach(s=>{
                const opt = document.createElement('option');
                opt.value = s; opt.textContent = `${s} - ${QUANTUM_ELEMENTS[s].nome}`;
                sel.appendChild(opt.cloneNode(true));
                selA.appendChild(opt.cloneNode(true));
                selB.appendChild(opt.cloneNode(true));
            });
            sel.value = 'H'; selA.value = 'Li'; selB.value = 'C';
        }
        
        function setupEvents() {
            document.getElementById('element-select').addEventListener('change', atualizarUI);
            ['i','s','q'].forEach(id=>{
                document.getElementById(`${id}-slider`).addEventListener('input', e=>{
                    document.getElementById(`${id}-val`).textContent = parseFloat(e.target.value).toFixed(2);
                    atualizarMAC();
                });
            });
            document.getElementById('transmute-btn').addEventListener('click', ()=>{
                const a = QUANTUM_ELEMENTS[document.getElementById('elem-a-select').value];
                const b = QUANTUM_ELEMENTS[document.getElementById('elem-b-select').value];
                const res = document.getElementById('transmute-result');
                if (a && b && a.raiz===3 && b.raiz===6) {
                    const e9 = Object.values(QUANTUM_ELEMENTS).find(e=>e.raiz===9 && e.grupo==='SINGULARIDADE');
                    res.innerHTML = `🔮 PORTAL 3-6-9 ATIVADO!<br>${e9?.simbolo || 'Og'} (${e9?.nome}) · ${Math.round((a.freq+b.freq)*1.5)} Hz`;
                    if(mainSphere) { mainSphere.material.emissive.setHex(0xd4a843); setTimeout(()=>mainSphere.material.emissive.setHex(0x222222),600); }
                } else res.innerHTML = '⚠️ Use Raiz 3 + Raiz 6.';
            });
            window.addEventListener('resize', ()=>{
                camera.aspect = innerWidth/innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(innerWidth, innerHeight);
            });
        }
        
        // Inicialização segura
        populateSelectors();
        initThree();
        atualizarUI();
        setupEvents();
        animate();
    </script>
</body>
</html>
